<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        body { background: #0f1215; color: white; font-family: 'Arial', sans-serif; margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; }
        .card { background: #1a1f24; border-radius: 12px; padding: 15px; width: 100%; max-width: 340px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); margin-bottom: 15px; }
        .win-sum { color: #00ff41; font-size: 28px; font-weight: bold; margin: 10px 0; }
        .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; width: 100%; max-width: 340px; }
        .cell { aspect-ratio: 1/1; background: #2c343d; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 22px; cursor: pointer; border-bottom: 3px solid #14191f; transition: 0.1s; }
        .cell.open { background: #007aff; border: none; transform: scale(0.95); }
        .cell.mine { background: #ff3b30; }
        .controls { width: 100%; max-width: 340px; }
        input, select { width: 100%; padding: 12px; margin: 5px 0; background: #2c343d; border: 1px solid #3d4650; color: white; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        .btn { background: #007aff; border: none; color: white; padding: 16px; width: 100%; border-radius: 10px; font-weight: bold; font-size: 18px; cursor: pointer; }
        .btn-cashout { background: #ff9500; margin-top: 10px; display: none; }
        .history { width: 100%; max-width: 340px; text-align: left; }
        .history-item { background: #1a1f24; padding: 8px 12px; border-radius: 6px; margin-bottom: 5px; display: flex; justify-content: space-between; font-size: 14px; border-left: 4px solid #00ff41; }
        .history-item.loss { border-left-color: #ff3b30; }
    </style>
</head>
<body>
    <div class="card">
        <div id="status">Множитель: x1.00</div>
        <div class="win-sum" id="win-display">$0.00</div>
    </div>

    <div class="grid" id="grid"></div>

    <div class="controls">
        <input type="number" id="bet" value="10.0" placeholder="Ставка">
        <select id="minesCount">
            <option value="3">3 мины</option><option value="5">5 мин</option>
            <option value="10">10 мин</option><option value="24">24 мины</option>
        </select>
        <button class="btn" id="playBtn" onclick="start()">ИГРАТЬ</button>
        <button class="btn btn-cashout" id="cashBtn" onclick="cashout()">ЗАБРАТЬ</button>
    </div>

    <div class="history">
        <h4>История игр</h4>
        <div id="history-list"></div>
    </div>

    <script>
        let mines = [], isPlay = false, opened = 0, currentMult = 1.0;
        const tg = window.Telegram.WebApp;

        function getMult(n, m) {
            let r = 1; for(let i=0; i<n; i++) r *= (25-i)/(25-m-i);
            return (r * 0.97).toFixed(2);
        }

        function start() {
            if(isPlay) return;
            mines = []; let mCount = parseInt(document.getElementById('minesCount').value);
            while(mines.length < mCount) { 
                let r = Math.floor(Math.random()*25); 
                if(!mines.includes(r)) mines.push(r); 
            }
            isPlay = true; opened = 0; currentMult = 1.0;
            document.getElementById('grid').innerHTML = '';
            for(let i=0; i<25; i++) {
                let c = document.createElement('div'); c.className = 'cell';
                c.onclick = () => click(i, c); document.getElementById('grid').appendChild(c);
            }
            document.getElementById('playBtn').style.display = 'none';
            document.getElementById('cashBtn').style.display = 'none';
            update(1.0);
        }

        function click(i, el) {
            if(!isPlay || el.classList.contains('open')) return;
            if(mines.includes(i)) {
                el.innerHTML = '💣'; el.classList.add('mine');
                finish(false);
            } else {
                opened++; el.innerHTML = '💎'; el.classList.add('open');
                currentMult = getMult(opened, mines.length);
                update(currentMult);
                document.getElementById('cashBtn').style.display = 'block';
                tg.HapticFeedback.impactOccurred('light');
            }
        }

        function update(m) {
            let b = parseFloat(document.getElementById('bet').value);
            document.getElementById('status').innerText = "Множитель: x" + m;
            document.getElementById('win-display').innerText = "$" + (b * m).toFixed(2);
        }

        function cashout() { finish(true); }

        function finish(win) {
            isPlay = false;
            let b = parseFloat(document.getElementById('bet').value);
            let res = (win ? b * currentMult : 0).toFixed(2);
            addHistory(win, res, currentMult);
            alert(win ? "Победа! $" + res : "Взрыв! Ставка проиграна.");
            document.getElementById('playBtn').style.display = 'block';
            document.getElementById('cashBtn').style.display = 'none';
        }

        function addHistory(win, sum, m) {
            const item = document.createElement('div');
            item.className = 'history-item ' + (win ? '' : 'loss');
            item.innerHTML = `<span>x${m}</span> <span>${win ? '+$'+sum : '-$'+document.getElementById('bet').value}</span>`;
            const list = document.getElementById('history-list');
            list.prepend(item);
            if(list.children.length > 5) list.lastChild.remove();
        }
    </script>
</body>
</html>
