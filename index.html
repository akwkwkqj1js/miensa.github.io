<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org"></script>
    <style>
        body { background: #0b1014; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 15px; margin: 0; overflow-x: hidden; }
        .stats { background: #151a21; width: 100%; max-width: 320px; padding: 15px; border-radius: 15px; border: 1px solid #232a33; margin-bottom: 20px; text-align: center; box-sizing: border-box; }
        .balance { color: #ff9500; font-weight: bold; font-size: 1.5em; }
        .grid-bg { background: #080c10; padding: 12px; border-radius: 20px; border: 3px solid #1c2530; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .grid { display: grid; grid-template-columns: repeat(5, 55px); gap: 10px; }
        .cell { width: 55px; height: 55px; background: linear-gradient(145deg, #1e83b1, #135b80); border-radius: 10px; cursor: pointer; transition: 0.2s; box-shadow: 0 4px #0d3d55; display: flex; align-items: center; justify-content: center; font-size: 24px; }
        .cell.open { background: #1a222c; box-shadow: none; transform: scale(0.95); border: 1px solid #333; }
        .cell.mine-hit { background: #ff3b30 !important; box-shadow: 0 0 20px #ff3b30; }
        .controls { width: 100%; max-width: 320px; margin-top: 20px; }
        input, select { width: 100%; padding: 14px; margin-bottom: 8px; background: #151a21; border: 1px solid #333; color: white; border-radius: 10px; font-size: 16px; box-sizing: border-box; outline: none; }
        .btn { width: 100%; padding: 16px; border-radius: 12px; border: none; font-weight: bold; font-size: 18px; cursor: pointer; transition: 0.2s; }
        .btn-play { background: #007aff; color: white; }
        .btn-play:active { background: #005bb5; }
        .btn-cashout { background: #ff9500; color: white; display: none; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="stats">
        <div>Ваш баланс</div>
        <div class="balance">∞ ₽</div>
        <div style="font-size: 24px; margin: 10px 0; color: #00ff41;" id="win-text">0.00 ₽</div>
        <div id="mult-text" style="color: #aaa;">Множитель: x1.00</div>
    </div>
    
    <div class="grid-bg"><div class="grid" id="grid"></div></div>
    
    <div class="controls">
        <input type="number" id="bet" value="1000">
        <select id="mCount">
            <option value="3">3 мины</option>
            <option value="5">5 мин</option>
            <option value="10">10 мин</option>
        </select>
        <!-- Текст V3 поможет понять, обновился ли GitHub -->
        <button class="btn btn-play" id="btn-p" onclick="startGameV3()">ИГРАТЬ (V3)</button>
        <button class="btn btn-cashout" id="btn-c" onclick="cashoutV3()">ЗАБРАТЬ</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();
        
        let mines = [], isPlay = false, opened = 0, bet = 0, currentMult = 1;

        function createGrid() {
            const g = document.getElementById('grid');
            g.innerHTML = '';
            for(let i=0; i<25; i++) {
                let c = document.createElement('div');
                c.className = 'cell';
                c.onclick = function() { clickCell(i, c); };
                g.appendChild(c);
            }
        }

        function startGameV3() {
            // Считываем ставку
            let inputBet = document.getElementById('bet').value;
            bet = parseFloat(inputBet) || 0;
            
            let count = parseInt(document.getElementById('mCount').value);
            
            // Генерируем мины
            mines = [];
            while(mines.length < count) {
                let r = Math.floor(Math.random() * 25);
                if(!mines.includes(r)) mines.push(r);
            }
            
            isPlay = true; 
            opened = 0; 
            currentMult = 1;
            
            createGrid(); // Пересоздаем поле
            
            document.getElementById('btn-p').style.display = 'none';
            document.getElementById('btn-c').style.display = 'none';
            document.getElementById('win-text').innerText = bet.toFixed(2) + " ₽";
            document.getElementById('mult-text').innerText = "Множитель: x1.00";
            
            tg.HapticFeedback.impactOccurred('medium');
        }

        async function clickCell(i, el) {
            if(!isPlay || el.classList.contains('open')) return;
            
            if(mines.includes(i)) {
                // МИНА
                el.classList.add('mine-hit'); 
                el.innerHTML = "💣";
                isPlay = false;
                await revealAllMines();
                setTimeout(() => { finishGame(0); }, 1000);
            } else {
                // АЛМАЗ
                opened++; 
                el.classList.add('open'); 
                el.innerHTML = "💎";
                currentMult = (Math.pow(1.22, opened)).toFixed(2);
                document.getElementById('win-text').innerText = (bet * currentMult).toFixed(2) + " ₽";
                document.getElementById('mult-text').innerText = "Множитель: x" + currentMult;
                document.getElementById('btn-c').style.display = 'block';
                tg.HapticFeedback.impactOccurred('light');
            }
        }

        async function revealAllMines() {
            const cells = document.getElementsByClassName('cell');
            for(let mIdx of mines) {
                if(!cells[mIdx].classList.contains('mine-hit')) {
                    cells[mIdx].classList.add('open');
                    cells[mIdx].innerHTML = "💣";
                    await new Promise(r => setTimeout(r, 70));
                }
            }
            tg.HapticFeedback.notificationOccurred('error');
        }

        function cashoutV3() { 
            finishGame(bet * currentMult); 
        }

        function finishGame(winAmount) {
            // Отправляем JSON в бот
            let result = JSON.stringify({
                win: winAmount, 
                bet: bet, 
                unlimited: true
            });
            tg.sendData(result);
            tg.close();
        }

        // Инициализация при загрузке
        createGrid();
    </script>
</body>
</html>
