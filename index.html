<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org"></script>
    <style>
        body { background: #0b1014; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 15px; margin: 0; overflow: hidden; }
        .stats { background: #151a21; width: 100%; max-width: 320px; padding: 15px; border-radius: 15px; border: 1px solid #232a33; margin-bottom: 20px; text-align: center; box-sizing: border-box; }
        .balance { color: #ff9500; font-weight: bold; font-size: 1.2em; }
        .grid-bg { background: #080c10; padding: 12px; border-radius: 20px; border: 3px solid #1c2530; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .grid { display: grid; grid-template-columns: repeat(5, 55px); gap: 10px; }
        .cell { width: 55px; height: 55px; background: linear-gradient(145deg, #1e83b1, #135b80); border-radius: 10px; cursor: pointer; transition: 0.2s; box-shadow: 0 4px #0d3d55; display: flex; align-items: center; justify-content: center; font-size: 24px; }
        .cell.open { background: #1a222c; box-shadow: none; transform: scale(0.95); border: 1px solid #333; }
        .cell.mine-hit { background: #ff3b30; box-shadow: 0 0 20px #ff3b30; }
        .controls { width: 100%; max-width: 320px; margin-top: 20px; }
        input, select { width: 100%; padding: 14px; margin-bottom: 8px; background: #151a21; border: 1px solid #333; color: white; border-radius: 10px; font-size: 16px; box-sizing: border-box; }
        .btn { width: 100%; padding: 16px; border-radius: 12px; border: none; font-weight: bold; font-size: 18px; cursor: pointer; transition: 0.3s; }
        .btn-play { background: #007aff; color: white; }
        .btn-cashout { background: #ff9500; color: white; display: none; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="stats">
        <div>Баланс: <span class="balance" id="bal-text">Загрузка...</span></div>
        <div style="font-size: 24px; margin: 10px 0; color: #00ff41;" id="win-text">0.00 ₽</div>
        <div id="mult-text" style="color: #aaa;">Множитель: x1.00</div>
    </div>
    <div class="grid-bg"><div class="grid" id="grid"></div></div>
    <div class="controls">
        <input type="number" id="bet" value="100">
        <select id="mCount">
            <option value="3">3 мины</option><option value="5">5 мин</option><option value="10">10 мин</option>
        </select>
        <button class="btn btn-play" id="btn-p" onclick="start()">ИГРАТЬ</button>
        <button class="btn btn-cashout" id="btn-c" onclick="cashout()">ЗАБРАТЬ</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        
        let urlParams = new URLSearchParams(window.location.search);
        let balance = parseFloat(urlParams.get('bal')) || 0;
        let bet = 0, mines = [], isPlay = false, opened = 0, currentMult = 1;

        document.getElementById('bal-text').innerText = balance.toFixed(2) + " ₽";

        function createGrid() {
            const g = document.getElementById('grid'); g.innerHTML = '';
            for(let i=0; i<25; i++) {
                let c = document.createElement('div'); c.className = 'cell';
                c.onclick = () => click(i, c); g.appendChild(c);
            }
        }

        function start() {
            bet = parseFloat(document.getElementById('bet').value);
            if(bet > balance || bet <= 0) return alert("Недостаточно средств!");
            
            balance -= bet; 
            document.getElementById('bal-text').innerText = balance.toFixed(2) + " ₽";
            
            let count = parseInt(document.getElementById('mCount').value);
            mines = [];
            while(mines.length < count) {
                let r = Math.floor(Math.random()*25);
                if(!mines.includes(r)) mines.push(r);
            }
            
            isPlay = true; opened = 0; createGrid();
            document.getElementById('btn-p').style.display = 'none';
            document.getElementById('win-text').innerText = bet.toFixed(2) + " ₽";
        }

        async function click(i, el) {
            if(!isPlay || el.classList.contains('open')) return;
            if(mines.includes(i)) {
                el.classList.add('mine-hit'); el.innerHTML = "💣";
                isPlay = false;
                await revealMines();
                sendResult(0);
            } else {
                opened++; el.classList.add('open'); el.innerHTML = "💎";
                currentMult = (Math.pow(1.18, opened)).toFixed(2);
                document.getElementById('win-text').innerText = (bet * currentMult).toFixed(2) + " ₽";
                document.getElementById('mult-text').innerText = "Множитель: x" + currentMult;
                document.getElementById('btn-c').style.display = 'block';
                tg.HapticFeedback.impactOccurred('medium');
            }
        }

        async function revealMines() {
            const cells = document.getElementsByClassName('cell');
            for(let mIdx of mines) {
                if(!cells[mIdx].classList.contains('mine-hit')) {
                    cells[mIdx].classList.add('open');
                    cells[mIdx].innerHTML = "💣";
                    await new Promise(r => setTimeout(r, 100));
                }
            }
        }

        function cashout() { sendResult(bet * currentMult); }

        function sendResult(winAmount) {
            tg.sendData(JSON.stringify({win: winAmount, bet: bet}));
            setTimeout(() => tg.close(), 500);
        }

        createGrid();
    </script>
</body>
</html>
