<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.5); } to { opacity: 1; transform: scale(1); } }
        @keyframes shake { 0%, 100% {transform: translateX(0);} 25% {transform: translateX(-5px);} 75% {transform: translateX(5px);} }
        
        body { background: #0f1215; color: white; font-family: 'Arial', sans-serif; margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; overflow: hidden; }
        .card { background: #1a1f24; border-radius: 15px; padding: 15px; width: 100%; max-width: 340px; border: 1px solid #333; margin-bottom: 10px; animation: fadeIn 0.5s ease; }
        .bal-val { color: #ff9500; font-weight: bold; }
        .win-sum { color: #00ff41; font-size: 32px; font-weight: bold; transition: 0.3s; }
        
        .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; width: 100%; max-width: 340px; }
        .cell { aspect-ratio: 1/1; background: #2c343d; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 24px; cursor: pointer; border-bottom: 4px solid #14191f; transition: all 0.2s; animation: fadeIn 0.3s backwards; }
        .cell.open { background: #007aff; border: none; transform: rotateY(180deg); }
        .cell.mine { background: #ff3b30; animation: shake 0.2s; }
        
        .controls { width: 100%; max-width: 340px; margin-top: 15px; }
        input { width: 100%; padding: 14px; margin: 5px 0; background: #2c343d; border: 1px solid #3d4650; color: white; border-radius: 10px; font-size: 16px; box-sizing: border-box; }
        .btn { background: #007aff; border: none; color: white; padding: 18px; width: 100%; border-radius: 12px; font-weight: bold; font-size: 18px; cursor: pointer; transition: 0.2s; }
        .btn:disabled { background: #444; cursor: not-allowed; }
        .btn-cashout { background: #ff9500; margin-top: 10px; display: none; }
    </style>
</head>
<body>
    <div class="card">
        <div>Баланс: <span class="bal-val" id="user-bal">$0.00</span></div>
        <div class="win-sum" id="win-display">$0.00</div>
        <div id="status">Множитель: x1.00</div>
    </div>

    <div id="grid" class="grid"></div>

    <div class="controls">
        <input type="number" id="bet" value="10.0">
        <button class="btn" id="playBtn" onclick="start()">ИГРАТЬ</button>
        <button class="btn btn-cashout" id="cashBtn" onclick="cashout()">ЗАБРАТЬ</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        let balance = 0, bet = 0, mines = [], isPlay = false, opened = 0, currentMult = 1.0;

        // Берем баланс из URL
        const urlParams = new URLSearchParams(window.location.search);
        balance = parseFloat(urlParams.get('balance')) || 0;
        document.getElementById('user-bal').innerText = "$" + balance.toFixed(2);

        function start() {
            bet = parseFloat(document.getElementById('bet').value);
            if(bet > balance || bet <= 0) {
                alert("Недостаточно средств!");
                return;
            }
            
            balance -= bet; // Списываем визуально
            document.getElementById('user-bal').innerText = "$" + balance.toFixed(2);
            
            isPlay = true; opened = 0; mines = [];
            while(mines.length < 3) {
                let r = Math.floor(Math.random()*25);
                if(!mines.includes(r)) mines.push(r);
            }

            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            for(let i=0; i<25; i++) {
                let c = document.createElement('div');
                c.className = 'cell';
                c.style.animationDelay = (i * 0.02) + 's';
                c.onclick = () => click(i, c);
                grid.appendChild(c);
            }
            document.getElementById('playBtn').style.display = 'none';
            update(1.0);
        }

        function click(i, el) {
            if(!isPlay || el.classList.contains('open')) return;
            if(mines.includes(i)) {
                el.innerHTML = '💣'; el.classList.add('mine');
                finish(false);
            } else {
                opened++; el.innerHTML = '💎'; el.classList.add('open');
                currentMult = (Math.pow(1.15, opened)).toFixed(2); // Пример икса
                update(currentMult);
                document.getElementById('cashBtn').style.display = 'block';
                tg.HapticFeedback.impactOccurred('medium');
            }
        }

        function update(m) {
            document.getElementById('status').innerText = "Множитель: x" + m;
            document.getElementById('win-display').innerText = "$" + (bet * m).toFixed(2);
        }

        function cashout() { finish(true); }

        function finish(win) {
            isPlay = false;
            let winSum = win ? (bet * currentMult) : 0;
            let change = win ? (winSum - bet) : -bet; // Для бота считаем чистую разницу
            
            // Отправляем данные в бот для синхронизации БД
            tg.sendData(JSON.stringify({ change: win ? winSum : -bet }));
            tg.close(); // Закрываем, чтобы бот обновил сообщение
        }
    </script>
</body>
</html>
